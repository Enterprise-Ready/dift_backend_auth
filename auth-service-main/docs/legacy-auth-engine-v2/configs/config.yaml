server:
  host: "0.0.0.0"
  port: 8080
  mode: "release"          # debug | release
  read_timeout: "30s"
  write_timeout: "30s"
  tls_enabled: false
  tls_cert: ""
  tls_key: ""

database:
  driver: "postgres"
  dsn: "host=localhost user=auth password=secret dbname=auth_engine port=5432 sslmode=disable TimeZone=UTC"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: "5m"

redis:
  addr: "localhost:6379"
  password: ""
  db: 0
  pool_size: 20
  max_retries: 3
  dial_timeout: "5s"
  read_timeout: "3s"
  write_timeout: "3s"

jwt:
  access_secret: "CHANGE_ME_ACCESS_SECRET_32CHARS_MIN"
  refresh_secret: "CHANGE_ME_REFRESH_SECRET_32CHARS_MIN"
  access_expiry: "15m"
  refresh_expiry: "168h"   # 7 days
  issuer: "auth-engine"
  algorithm: "HS512"
  rotation_enabled: false
  rotation_interval: "24h"

otp:
  length: 6
  expiry: "5m"
  max_attempts: 5
  cooldown_period: "1m"
  totp_enabled: true
  totp_issuer: "MyApp"

oauth:
  google:
    client_id: "GOOGLE_CLIENT_ID.apps.googleusercontent.com"
    client_secret: "GOOGLE_CLIENT_SECRET"
    redirect_url: "https://yourdomain.com/auth/callback/google"
    scopes: ["openid", "email", "profile"]
  apple:
    client_id: "com.yourapp.auth"
    team_id: "APPLE_TEAM_ID"
    key_id: "APPLE_KEY_ID"
    private_key: "/path/to/AuthKey_KEYID.p8"
    redirect_url: "https://yourdomain.com/auth/callback/apple"

email:
  provider: "sendgrid"    # sendgrid | ses | smtp | mailgun
  from: "noreply@yourdomain.com"
  from_name: "MyApp Security"
  sendgrid_api_key: "SG.xxxx"
  # --- AWS SES ---
  aws_region: "us-east-1"
  aws_access_key: ""
  aws_secret_key: ""
  # --- SMTP ---
  smtp_host: "smtp.gmail.com"
  smtp_port: 465
  smtp_username: ""
  smtp_password: ""
  # --- Mailgun ---
  mailgun_api_key: ""
  mailgun_domain: ""

sms:
  provider: "twilio"      # twilio | aws_sns | vonage
  twilio_sid: "ACxxxxxx"
  twilio_auth_token: "xxxx"
  twilio_from_number: "+1234567890"
  # --- AWS SNS ---
  aws_sns_region: "us-east-1"
  aws_sns_access_key: ""
  aws_sns_secret_key: ""
  # --- Vonage ---
  vonage_api_key: ""
  vonage_api_secret: ""

face:
  model_path: "./models/dlib"
  tolerance: 0.4           # lower = stricter (0.3-0.6 typical)
  min_confidence: 0.85
  storage_path: "./data/faces"
  max_face_size: 4096
  liveness_enabled: true

firebase:
  enabled: false
  service_account: "./firebase-service-account.json"
  project_id: "your-project-id"
  storage_bucket: "your-project.appspot.com"

supabase:
  enabled: false
  url: "https://your-project.supabase.co"
  anon_key: "your-anon-key"
  service_key: "your-service-key"

security:
  bcrypt_cost: 12
  max_login_attempts: 5
  lockout_duration: "15m"
  password_min_length: 8
  password_require_upper: true
  password_require_lower: true
  password_require_digit: true
  password_require_special: false
  session_max_devices: 5
  mfa_required: false
  ip_whitelist: []
  rate_limit:
    login_per_minute: 10
    otp_per_hour: 5
    register_per_day: 5
    global_per_second: 100

audit:
  enabled: true
  log_level: "info"
  retention_days: 90
  webhook_url: ""          # POST high-risk events here
