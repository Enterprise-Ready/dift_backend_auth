server:
  port: 3010
  read_timeout_seconds: 10
  write_timeout_seconds: 10
  idle_timeout_seconds: 60
  shutdown_timeout_seconds: 10
  cors:
    allow_origins:
      - "http://localhost:3000"
      - "http://localhost:5173"
    allow_headers:
      - "Origin"
      - "Content-Type"
      - "Authorization"
      - "X-Request-ID"
    allow_methods:
      - "GET"
      - "POST"
      - "PUT"
      - "PATCH"
      - "DELETE"
      - "OPTIONS"
auth:
  jwt_secret: "supersecretkey"
  refresh_jwt_secret: "refreshsupersecret"
  access_token_expires: "1h"
  refresh_token_expires: "720h"
services:
  identity_url: "http://localhost:3011"
  identity_grpc_addr: "localhost:9091"
  redis_addr: "localhost:6379"
